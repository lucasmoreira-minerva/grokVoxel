<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Loading GrokStage">
  <defs>
    <linearGradient id="lg" x1="10" y1="10" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5BBEFF"/>
      <stop offset="0.5" stop-color="#7C6CFF"/>
      <stop offset="1" stop-color="#FF6B7A"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="44" stroke="#1e293b" stroke-width="6"/>
  <circle cx="60" cy="60" r="44" stroke="url(#lg)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="60 200">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="1.1s" repeatCount="indefinite"/>
  </circle>
  <!-- Aperture petals -->
  <g opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="-360 60 60" dur="2.4s" repeatCount="indefinite"/>
    <path d="M60 36 L68 52 L60 48 L52 52 Z" fill="url(#lg)" opacity="0.85"/>
    <path d="M84 60 L68 68 L72 60 L68 52 Z" fill="url(#lg)" opacity="0.7"/>
    <path d="M60 84 L52 68 L60 72 L68 68 Z" fill="url(#lg)" opacity="0.85"/>
    <path d="M36 60 L52 52 L48 60 L52 68 Z" fill="url(#lg)" opacity="0.7"/>
  </g>
  <circle cx="60" cy="60" r="6" fill="#e8eef6"/>
</svg>
